<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Manager</title>
    <!-- Use Inter font for a clean, modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">

        <!-- Compact Single-Strip Header -->
        <div class="header-strip">
            <h1>Keep Manager</h1>

            <input type="text" id="search-input" placeholder="Search title or body...">

            <input type="text" id="regex-input" placeholder="Regex filter (e.g. \byoutube\.com\b)">

            <button id="search-btn">Filter</button>

            <!-- Action Bar (shows when notes are selected) -->
            <div id="action-bar" class="action-bar-inline" style="display: none;">
                <span class="selected-text"><strong id="selected-count">0</strong> selected</span>
                <button id="mass-delete-btn" class="danger btn-small">Delete</button>
                <button id="clear-selection-btn" class="btn-small btn-outline">Clear</button>
            </div>

            <div id="status" class="status-indicator status-loading">Initializing...</div>
            <div id="queue-status" class="queue-status" style="display: none;">
                <span class="queue-icon">⏳</span>
                <span id="queue-text">Processing...</span>
            </div>
        </div>

        <!-- Main Split Content -->
        <div class="main-content">
            <!-- Left Pane: Table -->
            <div class="table-area">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="checkbox-col">
                                    <input type="checkbox" id="select-all" title="Select All">
                                </th>
                                <th style="width: 35%">Title</th>
                                <th>Preview</th>
                            </tr>
                        </thead>
                        <tbody id="notes-table-body">
                            <!-- Rows will be populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right Pane: Note Preview -->
            <div class="preview-area" id="preview-area">
                <div class="preview-empty">Select a note to view its contents (Read-Only)</div>
            </div>
        </div>

    </div>

    <!-- Error/Warning Modal -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-dialog">
            <div class="modal-header">
                <h3 id="modal-title">Notification</h3>
                <button id="modal-close-btn" class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Dynamic content will be inserted here -->
            </div>
            <div class="modal-footer">
                <button id="modal-ok-btn" class="btn-primary">OK</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
